<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chain Trail</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        overflow: hidden;
        height: 100vh;

        cursor: crosshair;
      }
      .dot {
        position: absolute;
        top: 0;
        left: 0;
        clip-path: polygon(100% 50%, 0% 0%, 25% 50%, 0% 100%);
        will-change: transform;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <script type="module" src="./src/chain.js"></script>
  </body>
</html>
